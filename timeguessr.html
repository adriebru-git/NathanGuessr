<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NathanGuessr 🎂</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&display=swap');

    :root {
      --cream: #f5f0e8;
      --ink: #1a1410;
      --rust: #c4451a;
      --gold: #d4a853;
      --faded: #8c7b6b;
      --card: #fffdf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 20px 32px 14px;
      border-bottom: 2px solid var(--ink);
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      letter-spacing: -1px;
    }
    header .subtitle {
      font-size: 0.72rem;
      color: var(--faded);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .round-badge {
      margin-left: auto;
      font-size: 0.7rem;
      background: var(--ink);
      color: var(--cream);
      padding: 4px 12px;
      border-radius: 2px;
      letter-spacing: 1px;
    }

    /* ── Progress bar ── */
    .progress-bar {
      height: 4px;
      background: #ddd;
    }
    .progress-fill {
      height: 100%;
      background: var(--rust);
      transition: width 0.4s ease;
    }

    /* ── Main layout ── */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      flex: 1;
    }

    /* ── Photo panel ── */
    .photo-panel {
      padding: 28px 24px 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      border-right: 2px solid var(--ink);
    }

    .photo-frame {
      position: relative;
      border: 2px solid var(--ink);
      background: #000;
      overflow: hidden;
      aspect-ratio: 4/3;
    }
    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.5s;
    }
    .photo-label {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: var(--ink);
      color: var(--cream);
      font-size: 0.65rem;
      letter-spacing: 2px;
      padding: 3px 8px;
      text-transform: uppercase;
    }

    /* ── Slider ── */
    .year-section { display: flex; flex-direction: column; gap: 10px; }
    .year-section label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--faded);
    }
    .year-display {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      line-height: 1;
      color: var(--rust);
    }
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--ink);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: var(--rust);
      border: 2px solid var(--ink);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
    .year-range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--faded);
    }

    /* ── Guess panel ── */
    .guess-panel {
      padding: 28px 32px 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--faded);
    }

    #map {
      flex: 1;
      min-height: 260px;
      border: 2px solid var(--ink);
      cursor: crosshair;
    }

    .map-hint {
      font-size: 0.68rem;
      color: var(--faded);
      font-style: italic;
    }

    /* ── Validate button ── */
    .btn-validate {
      padding: 14px 0;
      background: var(--ink);
      color: var(--cream);
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    .btn-validate:hover { background: var(--rust); }
    .btn-validate:disabled { background: #bbb; cursor: not-allowed; }

    /* ── Result overlay ── */
    #result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,20,16,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #result-overlay.active { display: flex; }

    .result-card {
      background: var(--card);
      border: 2px solid var(--ink);
      padding: 40px 48px;
      max-width: 500px;
      width: 90%;
      animation: slideUp 0.35s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .result-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 6px;
    }
    .result-location-truth {
      font-size: 0.7rem;
      color: var(--faded);
      margin-bottom: 24px;
    }
    .score-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    .score-box {
      border: 1px solid var(--ink);
      padding: 14px 16px;
    }
    .score-box .s-label {
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--faded);
      margin-bottom: 4px;
    }
    .score-box .s-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--rust);
    }
    .total-score {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--faded);
      margin-bottom: 28px;
      border-top: 1px solid #ddd;
      padding-top: 14px;
    }
    .total-score span { font-size: 1.8rem; color: var(--ink); }

    .btn-next {
      width: 100%;
      padding: 14px;
      background: var(--rust);
      color: var(--cream);
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-next:hover { background: var(--ink); }

    /* ── Final screen ── */
    #final-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--ink);
      color: var(--cream);
      z-index: 2000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
    }
    #final-screen.active { display: flex; }
    #final-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: var(--gold);
    }
    #final-screen .final-score {
      font-size: 5rem;
      font-family: 'Playfair Display', serif;
      color: var(--cream);
    }
    #final-screen p { color: var(--faded); font-size: 0.8rem; letter-spacing: 2px; }
  </style>
</head>
<body>

<header>
  <h1>TimeGuessr</h1>
  <span class="subtitle">Édition Anniversaire</span>
  <div class="round-badge" id="round-label">Round 1 / 5</div>
</header>
<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<main>
  <!-- LEFT: photo + slider -->
  <section class="photo-panel">
    <div class="photo-frame">
      <img id="main-photo" src="" alt="Photo mystère" />
      <span class="photo-label">📸 Quand &amp; où ?</span>
    </div>

    <div class="year-section">
      <label>Ton année</label>
      <div class="year-display" id="year-display">2008</div>
      <input type="range" id="year-slider" min="1990" max="2026" value="2008" />
      <div class="year-range-labels"><span>1990</span><span>2026</span></div>
    </div>
  </section>

  <!-- RIGHT: map + validate -->
  <section class="guess-panel">
    <div class="panel-label">Clique sur la carte pour placer ta réponse</div>
    <div id="map"></div>
    <div class="map-hint" id="map-hint">Aucun marqueur placé</div>
    <button class="btn-validate" id="btn-validate" disabled>Valider ma réponse</button>
  </section>
</main>

<!-- Result overlay -->
<div id="result-overlay">
  <div class="result-card">
    <h2 id="result-title">Résultat</h2>
    <p class="result-location-truth" id="result-truth"></p>
    <div class="score-grid">
      <div class="score-box">
        <div class="s-label">Erreur de date</div>
        <div class="s-value" id="r-year-diff"></div>
      </div>
      <div class="score-box">
        <div class="s-label">Distance</div>
        <div class="s-value" id="r-dist"></div>
      </div>
      <div class="score-box">
        <div class="s-label">Points date</div>
        <div class="s-value" id="r-year-pts"></div>
      </div>
      <div class="score-box">
        <div class="s-label">Points lieu</div>
        <div class="s-value" id="r-loc-pts"></div>
      </div>
    </div>
    <div class="total-score">Score ce round : <span id="r-total"></span> / 1000</div>
    <button class="btn-next" id="btn-next">Round suivant →</button>
  </div>
</div>

<!-- Final screen -->
<div id="final-screen">
  <p>SCORE FINAL</p>
  <h2>🎂 Joyeux Anniversaire !</h2>
  <div class="final-score" id="final-score-val">0</div>
  <p>/ 5000 POINTS</p>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// 1. DATA — Remplace ces exemples par tes vraies photos/coords
// ─────────────────────────────────────────────────────────────
const rounds = [
  {
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Camponotus_flavomarginatus_ant.jpg/800px-Camponotus_flavomarginatus_ant.jpg",
    year: 2005,
    lat: 48.8566,
    lng: 2.3522,
    label: "Paris, France"
  },
  {
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/PNG_transparency_demonstration_1.png/280px-PNG_transparency_demonstration_1.png",
    year: 2012,
    lat: 40.7128,
    lng: -74.0060,
    label: "New York, USA"
  },
  {
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Bikeathon.jpg/800px-Bikeathon.jpg",
    year: 1998,
    lat: 51.5074,
    lng: -0.1278,
    label: "Londres, UK"
  },
  {
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/24701-nature-natural-beauty.jpg/800px-24701-nature-natural-beauty.jpg",
    year: 2019,
    lat: 35.6762,
    lng: 139.6503,
    label: "Tokyo, Japon"
  },
  {
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Above_Gotham.jpg/800px-Above_Gotham.jpg",
    year: 2023,
    lat: -33.8688,
    lng: 151.2093,
    label: "Sydney, Australie"
  }
];

// ─────────────────────────────────────────────────────────────
// 2. STATE
// ─────────────────────────────────────────────────────────────
let currentRound = 0;
let totalScore   = 0;
let userMarker   = null;
let userLat      = null;
let userLng      = null;
let answerMarker = null;
let polyline     = null;

// ─────────────────────────────────────────────────────────────
// 3. MAP INIT
// ─────────────────────────────────────────────────────────────
const map = L.map('map').setView([20, 0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

// Quand l'user clique sur la carte → poser un marqueur
map.on('click', (e) => {
  userLat = e.latlng.lat;
  userLng = e.latlng.lng;

  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.marker([userLat, userLng], {
    icon: L.divIcon({
      className: '',
      html: '<div style="width:14px;height:14px;background:#c4451a;border:2px solid #1a1410;border-radius:50%"></div>'
    })
  }).addTo(map);

  document.getElementById('map-hint').textContent =
    `Marqueur : ${userLat.toFixed(3)}, ${userLng.toFixed(3)}`;
  document.getElementById('btn-validate').disabled = false;
});

// ─────────────────────────────────────────────────────────────
// 4. SLIDER
// ─────────────────────────────────────────────────────────────
const slider      = document.getElementById('year-slider');
const yearDisplay = document.getElementById('year-display');
slider.addEventListener('input', () => {
  yearDisplay.textContent = slider.value;
});

// ─────────────────────────────────────────────────────────────
// 5. SCORE CALCULATION
// ─────────────────────────────────────────────────────────────

// Haversine : distance en km entre deux points GPS
function haversineKm(lat1, lng1, lat2, lng2) {
  const R  = 6371;
  const dL = (lat2 - lat1) * Math.PI / 180;
  const dl = (lng2 - lng1) * Math.PI / 180;
  const a  = Math.sin(dL/2)**2 +
             Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Score lieu  : 500 pts si <1 km, décroît exponentiellement jusqu'à 0 à ~5000 km
function locationScore(km) {
  return Math.round(500 * Math.exp(-km / 2000));
}

// Score année : 500 pts si exact, -50 pts par année d'écart, min 0
function yearScore(diff) {
  return Math.max(0, 500 - diff * 50);
}

// ─────────────────────────────────────────────────────────────
// 6. LOAD ROUND
// ─────────────────────────────────────────────────────────────
function loadRound(i) {
  const r = rounds[i];
  document.getElementById('main-photo').src = r.image;
  document.getElementById('round-label').textContent = `Round ${i+1} / ${rounds.length}`;
  document.getElementById('progress').style.width = `${(i / rounds.length) * 100}%`;

  // Réinitialiser la carte
  if (userMarker)  { map.removeLayer(userMarker);  userMarker  = null; }
  if (answerMarker){ map.removeLayer(answerMarker); answerMarker = null; }
  if (polyline)    { map.removeLayer(polyline);     polyline    = null; }
  map.setView([20, 0], 2);
  userLat = null; userLng = null;

  // Réinitialiser UI
  slider.value = 2008;
  yearDisplay.textContent = 2008;
  document.getElementById('map-hint').textContent = 'Aucun marqueur placé';
  document.getElementById('btn-validate').disabled = true;
}

// ─────────────────────────────────────────────────────────────
// 7. VALIDATE
// ─────────────────────────────────────────────────────────────
document.getElementById('btn-validate').addEventListener('click', () => {
  const r       = rounds[currentRound];
  const userYear = parseInt(slider.value);
  const yearDiff = Math.abs(userYear - r.year);
  const km       = haversineKm(userLat, userLng, r.lat, r.lng);
  const yPts     = yearScore(yearDiff);
  const lPts     = locationScore(km);
  const roundPts = yPts + lPts;
  totalScore    += roundPts;

  // Afficher la vraie réponse sur la carte
  answerMarker = L.marker([r.lat, r.lng], {
    icon: L.divIcon({
      className: '',
      html: '<div style="width:14px;height:14px;background:#d4a853;border:2px solid #1a1410;border-radius:50%"></div>'
    })
  }).addTo(map).bindPopup(`<b>${r.label}</b> (${r.year})`).openPopup();

  polyline = L.polyline([[userLat, userLng], [r.lat, r.lng]], {
    color: '#c4451a', dashArray: '5,8', weight: 2
  }).addTo(map);

  map.fitBounds([[userLat, userLng], [r.lat, r.lng]], { padding: [40, 40] });

  // Remplir le résultat
  document.getElementById('result-title').textContent =
    yPts + lPts >= 800 ? '🎯 Excellent !' : yPts + lPts >= 500 ? '👍 Pas mal !' : '😅 Raté...';
  document.getElementById('result-truth').textContent =
    `Réponse : ${r.label} — ${r.year}`;
  document.getElementById('r-year-diff').textContent = `${yearDiff} ans`;
  document.getElementById('r-dist').textContent      = km < 100 ? `${Math.round(km)} km` : `${Math.round(km)} km`;
  document.getElementById('r-year-pts').textContent  = yPts;
  document.getElementById('r-loc-pts').textContent   = lPts;
  document.getElementById('r-total').textContent     = roundPts;

  document.getElementById('btn-next').textContent =
    currentRound + 1 < rounds.length ? 'Round suivant →' : '🎂 Voir le score final';

  document.getElementById('result-overlay').classList.add('active');
});

// ─────────────────────────────────────────────────────────────
// 8. NEXT ROUND
// ─────────────────────────────────────────────────────────────
document.getElementById('btn-next').addEventListener('click', () => {
  document.getElementById('result-overlay').classList.remove('active');
  currentRound++;
  if (currentRound < rounds.length) {
    loadRound(currentRound);
  } else {
    document.getElementById('progress').style.width = '100%';
    document.getElementById('final-score-val').textContent = totalScore;
    document.getElementById('final-screen').classList.add('active');
  }
});

// ─────────────────────────────────────────────────────────────
// 9. START
// ─────────────────────────────────────────────────────────────
loadRound(0);
</script>
</body>
</html>
